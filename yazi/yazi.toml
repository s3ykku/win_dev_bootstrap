[mgr]
ratio = [1, 4, 3]

[preview]
wrap = "yes"
tab_size = 2

[opener]
edit = [
	{ run = "nvim %s", block = true, desc = "Edit with Neovim", for = "unix" },
	{ run = "nvim %s", block = true, desc = "Edit with Neovim", for = "windows" },
]
play = [
	{ run = "mpv %s", orphan = true, desc = "Play with mpv", for = "unix" },
	{ run = "mpv %s", orphan = true, desc = "Play with mpv", for = "windows" },
]

[open]
prepend_rules = [
	{ mime = "text/*", use = "edit" },
	{ mime = "application/{json,ndjson,toml,yaml,xml,javascript,wine-extension-ini}", use = "edit" },
	{ mime = "video/*", use = "play" },
]

[plugin]
prepend_previewers = [
	{ mime = "text/*", run = "code" },
	{ mime = "application/{json,ndjson,toml,yaml,xml,javascript,wine-extension-ini}", run = "code" },
]

[[plugin.prepend_fetchers]]
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
url   = "*/"
run   = "git"
group = "git"
