[mgr]
ratio = [1, 4, 3]

[preview]
wrap = "yes"
tab_size = 2

[opener]
edit = [
	{ run = "nvim %s", block = true, desc = "Edit with Neovim", for = "unix" },
	{ run = "nvim %s", block = true, desc = "Edit with Neovim", for = "windows" },
]
vscode = [
	{ run = "code %s1", orphan = true, desc = "Open in VS Code", for = "windows" },
]
zed = [
	{ run = "zed %s1", orphan = true, desc = "Open in Zed", for = "windows" },
]
play = [
	{ run = 'mpv "$@"', orphan = true, desc = "Play with mpv", for = "unix" },
	{ run = "mpv %*", orphan = true, desc = "Play with mpv", for = "windows" },
]

[open]
prepend_rules = [
	{ url = "*.bat", use = [ "edit", "open", "vscode", "zed" ] },
	{ url = "*.cmd", use = [ "edit", "open", "vscode", "zed" ] },
	{ mime = "text/*", use = [ "edit", "vscode", "zed" ] },
	{ mime = "application/{json,ndjson,toml,yaml,xml,javascript,wine-extension-ini}", use = [ "edit", "vscode", "zed" ] },
	{ mime = "video/*", use = [ "play", "vscode", "zed" ] },
]
append_rules = [
	{ url = "*/", use = [ "open", "vscode", "zed" ] },
	{ url = "*", use = [ "open", "vscode", "zed" ] },
]

[plugin]
prepend_previewers = [
	{ mime = "text/*", run = "code" },
	{ mime = "application/{json,ndjson,toml,yaml,xml,javascript,wine-extension-ini}", run = "code" },
]

[[plugin.prepend_fetchers]]
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
url   = "*/"
run   = "git"
group = "git"
